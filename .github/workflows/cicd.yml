name: Github_actionstest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Updated from v4

      - name: Set up Python
        uses: actions/setup-python@v6 # Updated from v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: List files (Debug)
        run: ls -R

      - name: Run tests
        run: pytest || (echo "Tests failed!" && exit 1)

  build-and-publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Updated from v4

      # Log in should come BEFORE the first build/push attempt
      - name: LOGIN TO DOCKERHUB
        uses: docker/login-action@v6 # Updated from v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        id: build_step # Added an ID to reference outputs later
        uses: docker/build-push-action@v7 # Updated from v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-docker-image:latest

      - name: Image digest
        run: echo ${{ steps.build_step.outputs.digest }}